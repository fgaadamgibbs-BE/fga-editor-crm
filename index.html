function usePersistedState(key, seed) {
  const [data, setData] = useState(null);
  const [ready, setReady] = useState(false);
  const [saving, setSaving] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const gistId = localStorage.getItem(LS_GIST);
        const token  = localStorage.getItem(LS_TOKEN);
        if (!gistId || !token) { setData(seed); setReady(true); return; }
        const r = await fetch("https://api.github.com/gists/" + gistId, {
          headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json" }
        });
        if (r.ok) {
          const gist = await r.json();
          const fileContent = gist.files[GIST_FILE]?.content;
          if (fileContent) { setData(JSON.parse(fileContent)); }
          else { setData(seed); }
        } else { setData(seed); }
      } catch { setData(seed); }
      setReady(true);
    })();
  }, []);
  const save = useCallback(async next => {
    setData(next);
    setSaving(true);
    try {
      const gistId = localStorage.getItem(LS_GIST);
      const token  = localStorage.getItem(LS_TOKEN);
      if (gistId && token) {
        await fetch("https://api.github.com/gists/" + gistId, {
          method: "PATCH",
          headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(next) } } })
        });
      }
    } catch(e) { console.error("Gist save failed:", e); }
    setSaving(false);
  }, []);
  return [data, save, ready, saving];
}

function CopyBtn({text}) {
  const [copied, setCopied] = useState(false);
  const copy = (e) => {
    e.stopPropagation();
    try {
      // Fallback method that works in sandboxed iframes
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "-9999px";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(()=>setCopied(false), 1500);
    } catch(err) {
      // Last resort: try modern API
      navigator.clipboard?.writeText(text).then(()=>{
        setCopied(true);
        setTimeout(()=>setCopied(false), 1500);
      }).catch(()=>{});
    }
  };
  return <button onClick={copy} title="Copy" style={{background:"none",border:"none",cursor:"pointer",color:copied?C.green:C.g400,display:"flex",padding:2,transition:"color .2s"}}>{copied ? <span style={{fontSize:11,fontWeight:600}}>✓</span> : I.copy}</button>;
}

              </div>
            </div>
          ) : (
            <div style={{fontSize:14,color:contact.notes?C.g600:C.g300,lineHeight:1.6,background:C.g100,padding:"10px 14px",borderRadius:8,minHeight:36}}>
              {contact.notes||"No notes yet. Click Edit to add."}
            </div>
          )}
        </div>

        {/* Placement History */}
        <div style={{borderTop:`1px solid ${C.borderLight}`,paddingTop:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:700,color:C.darkBlue,display:"flex",alignItems:"center",gap:6}}>{I.trophy} Placement History</div>
            <Btn variant="green" onClick={()=>setPitchOpen(true)}>{I.plus} Log Placement</Btn>
          </div>

          {pitchOpen && (
            <div style={{background:C.g100,borderRadius:10,padding:16,marginBottom:12,border:`2px solid ${C.green}`}}>
              <div style={{fontSize:12,color:C.g500,marginBottom:10,fontStyle:"italic"}}>
                Tip: After saving, the form clears so you can quickly add another. Click "Done" when finished.
              </div>
              <PitchForm contact={contact} onSave={p=>{onAddPitch(contact.id,p)}} onCancel={()=>setPitchOpen(false)} />
            </div>
          )}

          {contact.pitches?.length>0 ? (
            [...contact.pitches].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)).map((p,i) => (
              <div key={i} style={{background:i%2===0?C.g100:C.white,borderRadius:10,padding:"12px 16px",marginBottom:4,border:`1px solid ${C.borderLight}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:C.darkBlue}}>{p.publication||contact.publication} {p.topic&&`— ${p.topic}`}</div>
                    <div style={{fontSize:12,color:C.g500,marginTop:3}}>
                      {fmt(p.date)} {p.author&&`· Author: ${p.author}`} {p.editor&&`· Editor: ${p.editor}`}
                    </div>
                    {p.link && <a href={p.link} target="_blank" rel="noopener" style={{fontSize:12,color:C.medBlue,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:3,marginTop:4}}>{I.link} View piece</a>}
                    {p.notes && <div style={{fontSize:13,color:C.g500,marginTop:4,fontStyle:"italic"}}>{p.notes}</div>}
                  </div>
                  <button onClick={()=>{if(confirmPitchDel===i){onDeletePitch(contact.id,i);setConfirmPitchDel(null)}else{setConfirmPitchDel(i)}}} style={{background:confirmPitchDel===i?C.red:"none",border:"none",borderRadius:6,cursor:"pointer",color:confirmPitchDel===i?C.white:C.g300,padding:confirmPitchDel===i?"3px 8px":"2px",fontSize:11,fontWeight:600,fontFamily:"'Open Sans',sans-serif",whiteSpace:"nowrap",transition:"all .15s"}}>{confirmPitchDel===i?"Delete?":I.trash}</button>
                  {confirmPitchDel===i && <button onClick={()=>setConfirmPitchDel(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.g400,fontSize:11,fontFamily:"'Open Sans',sans-serif",padding:0}}>Cancel</button>}
                </div>
              </div>
            ))
          ) : !pitchOpen && (
            <div style={{textAlign:"center",padding:"28px 0",color:C.g300,fontSize:13}}>No placements logged yet.</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Main App ──
function SetupScreen({ onSave }) {
  const [token, setToken] = useState(localStorage.getItem(LS_TOKEN) || "");
  const [gistId, setGistId] = useState(localStorage.getItem(LS_GIST) || "");
  const [error, setError] = useState("");
  const [testing, setTesting] = useState(false);

  const handleSave = async () => {
    if (!token.trim() || !gistId.trim()) { setError("Both fields are required."); return; }
    setTesting(true); setError("");
    try {
      const r = await fetch("https://api.github.com/gists/" + gistId.trim(), {
        headers: { Authorization: "Bearer " + token.trim(), Accept: "application/vnd.github+json" }
      });
      if (!r.ok) { setError("Could not connect. Check your token and Gist ID."); setTesting(false); return; }
      localStorage.setItem(LS_TOKEN, token.trim());
      localStorage.setItem(LS_GIST, gistId.trim());
      onSave();
    } catch { setError("Network error. Try again."); }
    setTesting(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#F5F7FA",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Open Sans',sans-serif"}}>
      <div style={{background:"white",borderRadius:16,padding:40,width:460,boxShadow:"0 4px 24px rgba(0,0,0,.08)",border:"1px solid #E2E8F0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <img src={FGA_LOGO} style={{height:36}} alt="FGA" />
          <div>
            <div style={{fontWeight:700,fontSize:18,color:"#0D224D"}}>Editor CRM Setup</div>
            <div style={{fontSize:13,color:"#718096"}}>One-time configuration</div>
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:"#4A5568",marginBottom:6}}>GitHub Personal Access Token</label>
          <input value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_..." type="password"
            style={{width:"100%",padding:"10px 12px",border:"1px solid #CBD5E0",borderRadius:8,fontSize:14,fontFamily:"'Open Sans',sans-serif",boxSizing:"border-box"}} />
          <div style={{fontSize:11,color:"#A0AEC0",marginTop:4}}>Requires <code>gist</code> scope only</div>
        </div>
        <div style={{marginBottom:24}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:"#4A5568",marginBottom:6}}>Gist ID</label>
          <input value={gistId} onChange={e=>setGistId(e.target.value)} placeholder="e.g. 5f54b8bb9c486..."
            style={{width:"100%",padding:"10px 12px",border:"1px solid #CBD5E0",borderRadius:8,fontSize:14,fontFamily:"'Open Sans',sans-serif",boxSizing:"border-box"}} />
          <div style={{fontSize:11,color:"#A0AEC0",marginTop:4}}>Found in the URL of your Gist on github.com/gist</div>
        </div>
        {error && <div style={{background:"#FFF5F5",border:"1px solid #FED7D7",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#C53030",marginBottom:16}}>{error}</div>}
        <button onClick={handleSave} disabled={testing}
          style={{width:"100%",padding:"12px",background:"#0D224D",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Open Sans',sans-serif"}}>
          {testing ? "Connecting…" : "Save & Launch CRM"}
        </button>
        <div style={{fontSize:11,color:"#A0AEC0",marginTop:12,textAlign:"center"}}>Credentials are saved only in your browser — never in any file.</div>
      </div>
    </div>
  );
}

function App() {
  const [contacts, setContacts, ready, saving] = usePersistedState(STORAGE_KEY, SEED);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [hovered, setHovered] = useState(null);
  const [pubFilter, setPubFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [page, setPage] = useState(1);
  const [favFilter, setFavFilter] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [sortBy, setSortBy] = useState("publication");
  const [sortDir, setSortDir] = useState("asc");
  const PER_PAGE = 40;

  if (!ready) return (
    <div style={{fontFamily:"'Open Sans',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:C.darkBlue}}>FGA</div><div style={{color:C.medBlue,marginTop:4}}>Loading...</div></div>
    </div>
  );

  const save = next => setContacts(next);
  const importRef = useRef(null);

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(contacts, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "fga-editor-crm-" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!Array.isArray(parsed)) { alert("Invalid file: expected a JSON array."); return; }
        setContacts(parsed);
        alert("Imported " + parsed.length + " editors successfully!");
      } catch (err) {
        alert("Could not read file. Make sure it is a valid CRM export.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const addContact = f => {
    const id = Math.max(0,...contacts.map(c=>c.id))+1;
    save([{...f,id,pitches:f.pitches||[],status:f.status||"active"},...contacts]);
    setAdding(false);
  };
  const saveContact = f => {
    const next = contacts.map(c=>c.id===f.id?{...c,...f}:c);
    save(next); setEditing(null);
    if(selected?.id===f.id) setSelected({...selected,...f});
  };
  const deleteContact = id => { save(contacts.filter(c=>c.id!==id)); setSelected(null); };
  const addPitch = (id,p) => {
    const next = contacts.map(c=>c.id===id?{...c,pitches:[...(c.pitches||[]),p]}:c);
    save(next);
    setSelected(s=>s?.id===id?{...s,pitches:[...(s.pitches||[]),p]}:s);
  };
  const deletePitch = (id,pi) => {
    const next = contacts.map(c=>c.id===id?{...c,pitches:(c.pitches||[]).filter((_,i)=>i!==pi)}:c);
    save(next);
    setSelected(s=>s?.id===id?{...s,pitches:(s.pitches||[]).filter((_,i)=>i!==pi)}:s);
  };
  const updateField = (id,fields) => {
    const next = contacts.map(c=>c.id===id?{...c,...fields}:c);
    save(next);
    setSelected(s=>s?.id===id?{...s,...fields}:s);
  };

  const pubs = [...new Set(contacts.map(c=>c.publication).filter(Boolean))].sort();
  const totalPitches = contacts.reduce((s,c)=>s+(c.pitches?.length||0),0);

  // Status counts
  const statusCounts = {};
  STATUSES.forEach(s=>{statusCounts[s.key]=contacts.filter(c=>(c.status||"active")===s.key).length});

  const filtered = contacts.filter(c=>{
    if(favFilter && !c.starred) return false;
    if(pubFilter && c.publication!==pubFilter) return false;
    if(statusFilter && (c.status||"active")!==statusFilter) return false;
    if(search.trim()){
      const q = search.toLowerCase();
      return [c.name,c.publication,c.email,c.title,c.beat,c.city,c.notes,c.conversationStarter,c.phone]
        .filter(Boolean).some(v=>v.toLowerCase().includes(q));
    }
    return true;
  });

  const sorted = [...filtered].sort((a,b)=>{
    if(sortBy==="pitches"){
      return sortDir==="asc"?(a.pitches?.length||0)-(b.pitches?.length||0):(b.pitches?.length||0)-(a.pitches?.length||0);
    }
    const av=(a[sortBy]||"").toLowerCase(), bv=(b[sortBy]||"").toLowerCase();
    return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });

  const totalPages = Math.ceil(sorted.length/PER_PAGE);
  const rows = sorted.slice((page-1)*PER_PAGE, page*PER_PAGE);

  const handleSort = f => {
    if(sortBy===f) setSortDir(d=>d==="asc"?"desc":"asc");
    else { setSortBy(f); setSortDir("asc"); }
  };

  const SortArrow = ({f}) => <span style={{marginLeft:3,opacity:sortBy===f?1:.25,fontSize:10}}>{sortBy===f&&sortDir==="desc"?"▼":"▲"}</span>;

  const thStyle = {
    padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,textTransform:"uppercase",
    letterSpacing:".7px",color:C.g400,background:C.g100,borderBottom:`2px solid ${C.border}`,
    cursor:"pointer",whiteSpace:"nowrap",userSelect:"none",position:"sticky",top:0,zIndex:2,
  };

  const [showSetup, setShowSetup] = useState(!localStorage.getItem(LS_TOKEN) || !localStorage.getItem(LS_GIST));

  if (showSetup) return <SetupScreen onSave={() => { setShowSetup(false); window.location.reload(); }} />;
  if (!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Open Sans',sans-serif",color:"#718096",fontSize:16}}>Loading your CRM…</div>;

  return (
    <div style={{fontFamily:"'Open Sans',sans-serif",background:C.bg,minHeight:"100vh",color:C.g700,fontSize:14}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg, ${C.darkBlue} 0%, #16305E 100%)`,padding:"14px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(13,34,77,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <img src={FGA_LOGO} alt="FGA" style={{height:32}} />
          <div style={{width:1,height:24,background:"rgba(255,255,255,.15)"}} />
          <span style={{fontSize:12,fontWeight:600,color:C.medBlue,letterSpacing:"1.5px",textTransform:"uppercase"}}>Opinion Editor CRM</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"5px 14px",display:"flex",alignItems:"center",gap:6,color:C.white,fontSize:13}}>
            <span style={{fontWeight:700,fontSize:15,color:C.lightBlue}}>{contacts.length}</span> editors
          </div>
          <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"5px 14px",display:"flex",alignItems:"center",gap:6,color:C.white,fontSize:13}}>
            <span style={{fontWeight:700,fontSize:15,color:C.green}}>{totalPitches}</span> placements
          </div>
        </div>
      </div>

      <div style={{maxWidth:1300,margin:"0 auto",padding:"16px 20px"}}>
        {saving && <div style={{position:"fixed",top:12,right:16,background:"#1c2b4a",color:"white",padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,zIndex:9999,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>💾 Saving…</div>}
        {selected ? (
          <Detail contact={selected} onClose={()=>setSelected(null)} onEdit={setEditing} onDelete={deleteContact} onAddPitch={addPitch} onDeletePitch={deletePitch} onUpdate={updateField} />
        ) : (
          <>
            {/* Toolbar */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",flex:"1 1 280px",maxWidth:420}}>
                <span style={{color:C.g300,display:"flex"}}>{I.search}</span>
                <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} placeholder="Search editors..." style={{border:"none",outline:"none",flex:1,fontSize:14,fontFamily:"'Open Sans',sans-serif",color:C.g700,background:"transparent"}} />
                {search && <button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:C.g300,display:"flex"}}>{I.x}</button>}
              </div>
              <select value={pubFilter} onChange={e=>{setPubFilter(e.target.value);setPage(1)}} style={{padding:"9px 14px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,fontFamily:"'Open Sans',sans-serif",color:C.g600,background:C.white,cursor:"pointer",minWidth:180}}>
                <option value="">All Publications ({pubs.length})</option>
                {pubs.map(p=><option key={p} value={p}>{p} ({contacts.filter(c=>c.publication===p).length})</option>)}
              </select>
              <select value={statusFilter} onChange={e=>{setStatusFilter(e.target.value);setPage(1)}} style={{padding:"9px 14px",border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,fontFamily:"'Open Sans',sans-serif",color:statusFilter?(statusMap[statusFilter]?.color||C.g600):C.g600,background:C.white,cursor:"pointer",fontWeight:statusFilter?600:400}}>
                <option value="">All Statuses</option>
                {STATUSES.map(s=><option key={s.key} value={s.key}>{s.icon} {s.label} ({statusCounts[s.key]||0})</option>)}
              </select>
              <button onClick={()=>{setFavFilter(f=>!f);setPage(1)}} style={{
                padding:"9px 14px",border:`1px solid ${favFilter?C.gold:C.border}`,borderRadius:10,fontSize:13,
                fontFamily:"'Open Sans',sans-serif",color:favFilter?C.gold:C.g600,background:favFilter?`${C.gold}10`:C.white,
                cursor:"pointer",fontWeight:favFilter?700:400,display:"flex",alignItems:"center",gap:5,transition:"all .15s",
              }}>
                {favFilter ? I.starFilled : I.starEmpty} Favorites ({contacts.filter(c=>c.starred).length})
              </button>
              <Btn onClick={()=>setAdding(true)}>{I.plus} Add Editor</Btn>
              {confirmReset ? (
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Btn variant="danger" onClick={async()=>{
                    setContacts(SEED);
                    try{
                      const gistId = localStorage.getItem(LS_GIST);
                      const token  = localStorage.getItem(LS_TOKEN);
                      if (gistId && token) {
                        await fetch("https://api.github.com/gists/" + gistId, {
                          method: "PATCH",
                          headers: { Authorization: "Bearer " + token, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
                          body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(SEED) } } })
                        });
                      }
                    }catch{}
                    setConfirmReset(false);
                  }}>Yes, Reset All</Btn>
                  <Btn variant="ghost" onClick={()=>setConfirmReset(false)}>Cancel</Btn>
                </div>
              ) : (
                <Btn variant="secondary" onClick={()=>setConfirmReset(true)}>Reset</Btn>
              )}
              <Btn variant="secondary" onClick={handleExport} style={{display:"flex",alignItems:"center",gap:4}}>⬇ Export</Btn>
              <Btn variant="secondary" onClick={()=>importRef.current && importRef.current.click()} style={{display:"flex",alignItems:"center",gap:4}}>⬆ Import</Btn>
              <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport} />
            </div>

            <div style={{fontSize:12,color:C.g400,marginBottom:10}}>
              {filtered.length} editor{filtered.length!==1?"s":""}{search&&<> matching "<strong>{search}</strong>"</>}{pubFilter&&<> at <strong>{pubFilter}</strong></>}{statusFilter&&<> · {statusMap[statusFilter]?.label}</>}
            </div>

            {/* Table */}
            <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0}}>
                  <thead>
                    <tr>
                      <th style={{...thStyle,minWidth:40,width:40,textAlign:"center",cursor:"default",padding:"10px 6px"}}>★</th>
                      <th style={{...thStyle,minWidth:160}} onClick={()=>handleSort("publication")}>Publication <SortArrow f="publication"/></th>
                      <th style={{...thStyle,minWidth:150}} onClick={()=>handleSort("name")}>Editor <SortArrow f="name"/></th>
                      <th style={{...thStyle,minWidth:100,cursor:"default"}}>Status</th>
                      <th style={{...thStyle,minWidth:120}} onClick={()=>handleSort("title")}>Title <SortArrow f="title"/></th>
                      <th style={{...thStyle,minWidth:180,cursor:"default"}}>Email</th>
                      <th style={{...thStyle,minWidth:100}} onClick={()=>handleSort("pitches")}>Placements <SortArrow f="pitches"/></th>
                      <th style={{...thStyle,minWidth:50,cursor:"default"}}>Notes</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.length>0 ? rows.map((c,idx) => {
                      const h = hovered===c.id;
                      const zebra = idx%2===1;
                      const hasNotes = !!(c.notes||c.conversationStarter);
                      const pitchCount = c.pitches?.length||0;
                      const primaryEmail = (c.email||"").split(";")[0].trim();
                      const rowBg = h ? "#DDEAF5" : zebra ? C.zebraLight : C.zebraWhite;
                      const st = statusMap[c.status] || statusMap.active;
                      const tdBase = {padding:"10px 14px",borderBottom:`1px solid ${C.borderLight}`,backgroundColor:rowBg};

                      return (
                        <tr key={c.id} onClick={()=>setSelected(c)} onMouseEnter={()=>setHovered(c.id)} onMouseLeave={()=>setHovered(null)}
                          style={{cursor:"pointer",transition:"background .1s"}}>
                          <td style={{...tdBase,padding:"10px 6px",textAlign:"center",width:40}}>
                            <button onClick={e=>{e.stopPropagation();updateField(c.id,{starred:!c.starred})}} style={{background:"none",border:"none",cursor:"pointer",padding:2,display:"flex",alignItems:"center",justifyContent:"center",transition:"transform .15s",transform:c.starred?"scale(1.1)":"scale(1)"}}>
                              {c.starred ? I.starFilled : I.starEmpty}
                            </button>
                          </td>
                          <td style={{...tdBase,borderLeft:`3px solid ${st.color}`}}>
                            <div style={{fontWeight:700,fontStyle:"italic",color:C.darkBlue,fontSize:14}}>{c.publication||"—"}</div>
                          </td>
                          <td style={{...tdBase,fontSize:13,color:C.g700}}>
                            {c.name||"—"}
                          </td>
                          <td style={tdBase}>
                            <StatusSelect value={c.status||"active"} onChange={v=>updateField(c.id,{status:v})} compact />
                          </td>
                          <td style={{...tdBase,fontSize:13,color:C.g500}}>{c.title||"—"}</td>
                          <td style={tdBase}>
                            {primaryEmail ? (
                              <div style={{display:"flex",alignItems:"center",gap:4}}>
                                <span style={{color:C.medBlue,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}}>{primaryEmail}</span>
                                <CopyBtn text={primaryEmail} />
                              </div>
                            ) : <span style={{color:C.g300}}>—</span>}
                          </td>
                          <td style={tdBase}>
                            {pitchCount>0 ? (
                              <span style={{display:"inline-flex",alignItems:"center",gap:4,color:C.green,fontWeight:700,fontSize:13}}>{I.trophy} {pitchCount}</span>
                            ) : <span style={{color:C.g300,fontSize:12}}>—</span>}
                          </td>
                          <td style={tdBase}>
                            {hasNotes ? <span style={{color:C.gold,display:"flex"}}>{I.note}</span> : <span style={{color:C.g300}}>—</span>}
                          </td>
                        </tr>
                      );
                    }) : (
                      <tr><td colSpan={8} style={{textAlign:"center",padding:"50px 20px",color:C.g300}}>
                        <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                        <div style={{fontWeight:600}}>No editors found</div>
                        <div style={{fontSize:13}}>Try a different search or filter.</div>
                      </td></tr>
                    )}
                  </tbody>
                </table>
              </div>
              {totalPages>1 && (
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 0",borderTop:`1px solid ${C.borderLight}`}}>
                  <button disabled={page===1} onClick={()=>setPage(p=>p-1)} style={{width:32,height:32,borderRadius:6,border:"none",cursor:page===1?"default":"pointer",background:"transparent",color:page===1?C.g300:C.g500,fontWeight:600,fontSize:14,fontFamily:"'Open Sans',sans-serif"}}>←</button>
                  {Array.from({length:Math.min(totalPages,7)},(_,i)=>{
                    let p; if(totalPages<=7)p=i+1; else if(page<=4)p=i+1; else if(page>=totalPages-3)p=totalPages-6+i; else p=page-3+i;
                    return <button key={p} onClick={()=>setPage(p)} style={{width:32,height:32,borderRadius:6,border:"none",cursor:"pointer",fontWeight:p===page?700:500,fontSize:13,background:p===page?C.medBlue:"transparent",color:p===page?C.white:C.g400,fontFamily:"'Open Sans',sans-serif",transition:"all .15s"}}>{p}</button>;
                  })}
                  <button disabled={page===totalPages} onClick={()=>setPage(p=>p+1)} style={{width:32,height:32,borderRadius:6,border:"none",cursor:page===totalPages?"default":"pointer",background:"transparent",color:page===totalPages?C.g300:C.g500,fontWeight:600,fontSize:14,fontFamily:"'Open Sans',sans-serif"}}>→</button>
                </div>
              )}
            </div>
          </>
        )}
      </div>

      <Modal open={adding} onClose={()=>setAdding(false)} title="Add New Editor">
        <ContactForm onSave={addContact} onCancel={()=>setAdding(false)} />
      </Modal>
      <Modal open={!!editing} onClose={()=>setEditing(null)} title="Edit Editor">
        {editing && <ContactForm contact={editing} onSave={saveContact} onCancel={()=>setEditing(null)} />}
      </Modal>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
